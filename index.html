<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>TradeFlow</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#04070f">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="TradeFlow">
  <link rel="apple-touch-icon" href="icons/web-app-manifest-192x192.png">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    html, body { width:100%; height:100%; background:#04070f; }
    #splash {
      position:fixed; inset:0; z-index:9999;
      background:#04070f;
      display:flex; flex-direction:column;
      align-items:center; justify-content:center; gap:20px;
      transition:opacity .5s ease;
    }
    #splash img { width:80px; height:80px; border-radius:20px; }
    .name { font-family:system-ui,sans-serif; font-size:28px; font-weight:800; color:#f0f2ff; letter-spacing:-0.5px; }
    .name span { color:#38bdf8; }
    .sub { font-family:system-ui,sans-serif; font-size:13px; color:#4a5270; }
    .loader-bar { width:120px; height:2px; background:rgba(255,255,255,.07); border-radius:10px; overflow:hidden; }
    .loader-bar-fill { height:100%; background:linear-gradient(90deg,#7c6bff,#38bdf8,#34d399); border-radius:10px; animation:lBar 1.4s ease-in-out infinite; }
    @keyframes lBar { 0%{width:0%;margin-left:0%} 50%{width:65%;margin-left:17%} 100%{width:0%;margin-left:100%} }
    #installBanner {
      display:none; position:fixed; top:0; left:0; right:0; z-index:99998;
      background:linear-gradient(135deg,rgba(124,107,255,0.15),rgba(56,189,248,0.1));
      border-bottom:1px solid rgba(124,107,255,0.25);
      padding:10px 16px; gap:10px; align-items:center; justify-content:space-between;
    }
    @keyframes toastDown { from{transform:translateY(-20px);opacity:0} to{transform:translateY(0);opacity:1} }
  </style>
</head>
<body>

  <div id="splash">
    <img src="https://raw.githubusercontent.com/renaxalv/Icons/refs/heads/main/tradeflow-logo.ico" alt="TradeFlow">
    <div class="name">Trade<span>Flow</span></div>
    <div class="sub">Track it. Manage it. Grow it.</div>
    <div class="loader-bar"><div class="loader-bar-fill"></div></div>
  </div>

  <div id="installBanner">
    <div style="display:flex;align-items:center;gap:10px">
      <img src="icons/web-app-manifest-192x192.png" style="width:28px;height:28px;border-radius:8px">
      <div>
        <div style="font-family:system-ui,sans-serif;font-size:12px;font-weight:700;color:#f0f2ff">Instalar TradeFlow</div>
        <div id="installBannerMsg" style="font-family:system-ui,sans-serif;font-size:10px;color:#8892b0">Acesso rápido pela tela inicial</div>
      </div>
    </div>
    <div style="display:flex;gap:6px">
      <button id="installBannerBtn" onclick="instalarApp()" style="display:none;background:linear-gradient(135deg,#7c6bff,#38bdf8);border:none;border-radius:8px;padding:6px 14px;color:#fff;font-size:12px;font-weight:700;cursor:pointer">Instalar</button>
      <button onclick="fecharBanner()" style="background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.08);border-radius:8px;padding:6px 10px;color:#8892b0;font-size:12px;cursor:pointer">✕</button>
    </div>
  </div>

  <script>
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbwcieOp6PLjTbAhXM7m_86oKyyjL_c1TZ8DhAxgRs5r9VFsRc82y5W75rc2_bLEedEx/exec';
    const isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;
    const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
    const bannerDismissed = (() => { try { return localStorage.getItem('tf_banner_dismissed'); } catch(e) { return false; } })();

    if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');

    let deferredPrompt;
    window.addEventListener('beforeinstallprompt', e => {
      e.preventDefault();
      deferredPrompt = e;
      if (!isStandalone && !bannerDismissed) document.getElementById('installBannerBtn').style.display = 'block';
    });

    if (!isStandalone && !bannerDismissed) {
      const banner = document.getElementById('installBanner');
      banner.style.display = 'flex';
      banner.style.animation = 'toastDown .4s ease both';
      if (isIOS) document.getElementById('installBannerMsg').innerHTML = 'Compartilhar → Adicionar à Tela de Início';
    }

    function instalarApp() {
      if (deferredPrompt) {
        deferredPrompt.prompt();
        deferredPrompt.userChoice.then(() => { deferredPrompt = null; fecharBanner(); });
      }
    }

    function fecharBanner() {
      document.getElementById('installBanner').style.display = 'none';
      try { localStorage.setItem('tf_banner_dismissed', '1'); } catch(e) {}
    }

    setTimeout(() => {
      const splash = document.getElementById('splash');
      splash.style.opacity = '0';
      setTimeout(() => { window.location.href = GAS_URL; }, 500);
    }, 3000);
  </script>

</body>
</html>
